<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f5f6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ODESSOS">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>ODESSOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8; --surf:#ffffff; --line:#e6e8ec; --line2:#eef0f3;
  --ink:#1a1d21; --dim:#8a9099; --dim2:#b4b9c0;
  --acc:#5b5bd6; --acc-soft:#f0f0fb; --acc-line:#e2e2f6;
  --grn:#3f9d6b; --grn-soft:#e9f5ef;
  --amber:#b3641e; --amber-soft:#fdf3e7; --amber-line:#f0ddc4;
  --red:#c0453a; --red-soft:#faecea;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --rad:16px; --rad-s:10px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;
  padding-top:calc(var(--sat) + 86px);padding-bottom:calc(var(--sab) + 74px);min-height:100dvh}
button{font-family:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg);
  border:1px solid var(--line);border-radius:var(--rad-s);padding:9px 11px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.mono{font-family:var(--mono)}
.num{font-family:var(--mono);font-weight:600;letter-spacing:-.01em}

/* ---------- header + signal strip ---------- */
#hdr{position:fixed;top:0;left:0;right:0;z-index:40;background:rgba(245,246,248,.92);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);
  padding:calc(var(--sat) + 10px) 16px 0}
#hdr .row{display:flex;align-items:center;gap:10px}
#hdr .brand{font-weight:800;font-size:15px;letter-spacing:.14em}
#hdr .date{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:1px}
#hdr .rk{margin-left:auto;text-align:right}
#hdr .rk .r{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--acc);font-weight:600}
#hdr .rk .l{font-size:11px;color:var(--dim)}
#hdr .rk .l b{color:var(--ink);font-family:var(--mono)}
#xpbar{height:3px;border-radius:2px;background:var(--line2);margin-top:7px;overflow:hidden}
#xpbar i{display:block;height:100%;background:var(--acc);width:0%;transition:width .4s}
#sig{display:block;width:100%;height:22px;margin-top:2px}

/* ---------- layout ---------- */
main{max-width:520px;margin:0 auto;padding:14px 14px 8px}
.view{display:none}.view.on{display:block}
.glbl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);font-weight:600;margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
.glbl .r{margin-left:auto;letter-spacing:0}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;margin-bottom:12px}
.prow{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--line2)}
.prow:last-child{border-bottom:0}
.prow .lab{font-size:13.5px;line-height:1.35;flex:1;min-width:0}
.prow .lab small{display:block;color:var(--dim);font-size:11.5px;margin-top:1px}
.prow .meta{font-family:var(--mono);font-size:10.5px;color:var(--dim);white-space:nowrap;text-align:right}
.prow .meta b{color:var(--grn);font-weight:600}
.pill-h{display:flex;align-items:center;gap:8px;padding:11px 14px 3px}
.pill-h .nm{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em}
.pill-h .stt{font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.06em}
.pill-h .hrs{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--acc);font-weight:600}
.chip{font-family:var(--mono);font-size:10px;background:var(--acc-soft);border-radius:7px;padding:4px 8px;color:#4a4a86}
.chip b{color:var(--acc)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--ink);color:#fff;
  font-weight:600;font-size:13px;padding:11px 16px;border-radius:12px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.sec{background:var(--bg);color:var(--ink);border:1px solid var(--line)}
.btn.acc{background:var(--acc)}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:9px}
.btn.ghost{background:none;border:1px dashed var(--line);color:var(--dim)}
.btn:disabled{opacity:.4;pointer-events:none}
.check{width:20px;height:20px;border-radius:7px;border:1.6px solid #cdd1d7;flex:none;display:grid;place-items:center;
  font-size:12px;color:#fff;transition:.15s}
.check.done{background:var(--grn);border-color:var(--grn)}
.done-lab{text-decoration:line-through;color:var(--dim)}
.banner{border-radius:var(--rad);padding:12px 14px;margin-bottom:12px;font-size:13px}
.banner.red{background:var(--red-soft);border:1px solid #efd4d1;color:#7c2f28}
.banner .x{float:right;font-family:var(--mono);color:inherit;opacity:.6;padding:0 4px}
.empty{color:var(--dim);font-size:12.5px;padding:14px;text-align:center}
.tag-u{font-family:var(--mono);font-size:9.5px;color:var(--acc);font-weight:700}
.rare .lab .t::after{content:'RARE';font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--amber);
  border:1px solid var(--amber-line);background:var(--amber-soft);border-radius:5px;padding:1px 5px;margin-left:7px;vertical-align:1px}
.chal-card{border:1px solid var(--amber-line);background:linear-gradient(135deg,var(--amber-soft),#fff 55%)}
.dir-card{border:1px solid var(--acc-line);background:linear-gradient(135deg,var(--acc-soft),#fff 60%)}
.gate-flag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--amber);font-weight:700}

/* stats */
.statrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line2)}
.statrow:last-child{border-bottom:0}
.statrow .k{font-family:var(--mono);font-size:11px;font-weight:700;width:36px;letter-spacing:.06em}
.statrow .v{font-family:var(--mono);font-size:18px;font-weight:700;width:40px;text-align:right}
.statrow .barwrap{flex:1}
.statrow .bar{height:6px;border-radius:4px;background:var(--line2);overflow:hidden;position:relative}
.statrow .bar i{display:block;height:100%;background:var(--acc);border-radius:4px;transition:width .4s}
.statrow .bar.atgate i{background:var(--amber)}
.statrow .sub{font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between}

/* nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.94);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 8px calc(var(--sab) + 8px)}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);
  font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;padding:5px 0;border-radius:10px}
#nav button.on{color:var(--acc)}
#nav .ic{font-size:16px;line-height:1;font-family:var(--mono)}
#fab{position:fixed;right:16px;bottom:calc(var(--sab) + 84px);z-index:39;width:52px;height:52px;border-radius:17px;
  background:var(--ink);color:#fff;font-size:24px;font-weight:300;box-shadow:0 10px 26px -8px rgba(20,22,30,.45);
  display:grid;place-items:center}

/* sheet + modal */
#shroud{position:fixed;inset:0;background:rgba(20,22,30,.42);z-index:60;display:none}
#shroud.on{display:block}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--surf);border-radius:22px 22px 0 0;
  transform:translateY(105%);transition:transform .26s cubic-bezier(.3,.9,.3,1);max-height:86dvh;overflow:auto;
  padding:16px 18px calc(var(--sab) + 20px)}
#sheet.on{transform:translateY(0)}
#sheet h3{font-size:16px;font-weight:800;letter-spacing:-.01em;margin-bottom:2px}
#sheet .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
.frow{margin-bottom:11px}
.frow label{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);margin-bottom:5px}
.seg{display:flex;flex-wrap:wrap;gap:6px}
.seg button{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 12px;font-size:12.5px}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.sheet-actions{display:flex;gap:9px;margin-top:16px}
.sheet-actions .btn{flex:1}
#toasts{position:fixed;top:calc(var(--sat) + 92px);left:0;right:0;z-index:80;display:flex;flex-direction:column;
  align-items:center;gap:7px;pointer-events:none}
.toast{background:var(--ink);color:#fff;font-size:12.5px;padding:9px 15px;border-radius:20px;
  box-shadow:0 8px 24px -8px rgba(0,0,0,.4);animation:tin .22s;font-family:var(--mono);max-width:88%}
.toast.gold{background:var(--amber)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.list-btn{width:100%;text-align:left;display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--line2);font-size:13.5px}
.list-btn:last-child{border-bottom:0}
.list-btn small{display:block;color:var(--dim);font-size:11px}
.list-btn .r{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--dim)}
.day-card .dh{display:flex;align-items:baseline;gap:8px;padding:11px 14px 5px}
.day-card .dh .d{font-family:var(--mono);font-size:11px;font-weight:700}
.day-card .dh .s{font-family:var(--mono);font-size:9.5px;margin-left:auto}
.day-card .body{padding:0 14px 12px;font-size:12.5px;color:var(--dim)}
.day-card .note{color:var(--ink);font-size:13px;margin-top:5px;white-space:pre-wrap}
.gatebox{border-top:1px solid var(--line2);padding:11px 14px}
.gatebox .gh{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em}
.gatebox .req{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.5}
.filerow{padding:12px 14px;border-bottom:1px solid var(--line2)}
.filerow:last-child{border-bottom:0}
.filerow .fn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em}
.filerow .fl{font-size:12.5px;color:var(--dim);margin-top:3px;font-style:italic}
.filerow.locked{opacity:.45}
.filerow.locked .fl{filter:blur(3px)}
.smallcaps{font-variant:all-small-caps;letter-spacing:.08em}
</style>
</head>
<body>

<header id="hdr">
  <div class="row">
    <div>
      <div class="brand">ODESSOS</div>
      <div class="date" id="h-date"></div>
    </div>
    <div class="rk">
      <div class="r" id="h-rank">NOBODY</div>
      <div class="l">lv <b id="h-lvl">1</b> · <span class="num" id="h-xp">0</span> xp</div>
    </div>
  </div>
  <div id="xpbar"><i id="h-xpfill"></i></div>
  <canvas id="sig" width="520" height="22"></canvas>
</header>

<main>
  <section class="view on" id="v-today"></section>
  <section class="view" id="v-tracks"></section>
  <section class="view" id="v-log"></section>
  <section class="view" id="v-you"></section>
</main>

<button id="fab" onclick="openLedger()" aria-label="Log activity">+</button>

<nav id="nav">
  <button class="on" data-v="today" onclick="tab('today')"><span class="ic">◉</span>TODAY</button>
  <button data-v="tracks" onclick="tab('tracks')"><span class="ic">⛰</span>TRACKS</button>
  <button data-v="log" onclick="tab('log')"><span class="ic">≡</span>LOG</button>
  <button data-v="you" onclick="tab('you')"><span class="ic">Ø</span>YOU</button>
</nav>

<div id="shroud" onclick="closeSheet()"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toasts"></div>

<script>
'use strict';
/* ================= CONSTANTS ================= */
const KEY='odessos_v5';
const STATS=['STR','VIT','INT','WIS','CHA'];
const PRICE=[3,5,8,12,20];                 // units per point, by band
const UCAP={STR:2,VIT:2,INT:3,WIS:3,CHA:3}; // units/day cap
const RANKS=[[1,'NOBODY'],[3,'DRIFTER'],[5,'RUNNER'],[8,'OPERATOR'],[11,'GHOST'],[15,'WRAITH'],[19,'SPECTER'],[24,'REVENANT'],[30,'LEGEND'],[37,'MYTH']];
const XP={hour:12,target:20,train:15,prog:5,ma:20,block:15,quota:50,dir:250,book:40,
  contract:{ERRAND:12,JOB:30,HEIST:60},free:{S:8,M:14,L:20},
  sell:{demo:25,outreach:10,post:12,event:15,talk:30,convo:10}};
const xpToNext=l=>120+(l-1)*90;
function levelFromXP(x){let l=1;while(x>=xpToNext(l)){x-=xpToNext(l);l++;if(l>99)break}return{l,into:x,need:xpToNext(l)}}
const rankFor=l=>{let r=RANKS[0][1];for(const[a,b]of RANKS)if(l>=a)r=b;return r};

const GATES={
 STR:{20:{n:'FIRST PLATE',t:'lifts',r:{sq:1.0,be:.75,dl:1.25},d:'Clear 2 of 3: squat 1.0×BW · bench 0.75×BW · deadlift 1.25×BW'},
      40:{n:'NOVICE IRON',t:'lifts',r:{sq:1.25,be:1.0,dl:1.5},d:'Clear 2 of 3: squat 1.25×BW · bench 1.0×BW · deadlift 1.5×BW'},
      60:{n:'INTERMEDIATE',t:'lifts',r:{sq:1.6,be:1.25,dl:2.0},d:'Clear 2 of 3: squat 1.6×BW · bench 1.25×BW · deadlift 2.0×BW'},
      80:{n:'ADVANCED',t:'lifts',r:{sq:2.25,be:1.75,dl:2.5},d:'Clear 2 of 3: squat 2.25×BW · bench 1.75×BW · deadlift 2.5×BW'},
      100:{n:'ELITE',t:'lifts',r:{sq:2.75,be:2.1,dl:3.0},d:'Clear 2 of 3: squat 2.75×BW · bench 2.1×BW · deadlift 3.0×BW'}},
 VIT:{20:{n:'OFF THE COUCH',t:'vit',d:'Finish a 5k, any pace — or swim 1 km continuous',p:{k5:9999,swim:'1 km continuous swim, any stroke'}},
      40:{n:'SUB-30',t:'vit',d:'5k under 30:00 — or 10k under 63:00 — or swim 2 km continuous',p:{k5:1800,k10:3780,swim:'2 km continuous swim'}},
      60:{n:'SUB-25',t:'vit',d:'5k under 25:00 — or 10k under 52:00',p:{k5:1500,k10:3120}},
      80:{n:'SUB-21',t:'vit',d:'5k under 21:00 — or 10k under 43:30 — or half marathon under 1:37',p:{k5:1260,k10:2610,half:5820}},
      100:{n:'SUB-18',t:'vit',d:'5k under 18:00 — or 10k under 37:30 — or half under 1:23',p:{k5:1080,k10:2250,half:4980}}},
 INT:{20:{n:'FOUNDATIONS',t:'list',d:'boot.dev Python course complete · boot.dev Linux/command-line + Git courses · diagram MappedUP’s request flow (WeWeb→Xano→DB) from memory'},
      40:{n:'BUILDER',t:'list',d:'boot.dev Algorithms + Data Structures · JS-for-Xano slice (javascript.info fundamentals; read & write a Xano lambda in sandbox) · 2 DeepLearning.AI LLM short courses · first working LLM-API project in Python · NeetCode 25'},
      60:{n:'ENGINEER',t:'list',d:'boot.dev HTTP servers + SQL courses · Karpathy Zero-to-Hero part 1 (micrograd + makemore) · one Python automation you actually use · NeetCode 75 · can modify & redeploy ODESSOS solo'},
      80:{n:'ARCHITECT',t:'list',d:'Karpathy Zero-to-Hero complete (GPT from scratch) or fast.ai part 1 + your own fine-tuned model · AI feature prototype for MappedUP or shipping · OWASP Top-10 audit of MappedUP · boot.dev capstone or equivalent deployed · NeetCode 150'},
      100:{n:'THE INSANE',t:'list',d:'An original AI tool with real users · or research-grade work · could rebuild MappedUP’s core solo'}},
 WIS:{20:{n:'FIRST SHELF',t:'wis',b:3,c:800,d:'3 books w/ synthesis notes — or chess.com rapid 800'},
      40:{n:'READER',t:'wis',b:10,c:1000,d:'10 books — or rapid 1000'},
      60:{n:'SYNTHESIST',t:'wis',b:25,c:1200,d:'25 books — or rapid 1200 (top ~30%)'},
      80:{n:'SAGE',t:'wis',b:50,c:1600,d:'50 books — or rapid 1600 (top ~7%)'},
      100:{n:'ORACLE',t:'wis',b:100,c:2000,d:'100 books — or rapid 2000 (top ~1%)'}},
 CHA:{20:{n:'FIRST CONTACT',t:'list',d:'5 demos/calls delivered + 3 posts published'},
      40:{n:'VOICE',t:'list',d:'25 demos/calls + first talk to 5+ people'},
      60:{n:'PRESENCE',t:'list',d:'100 lifetime reps incl. 3 talks'},
      80:{n:'CLOSER',t:'list',d:'20 customers won through your own pipeline — or a conference talk'},
      100:{n:'GRAVITAS',t:'list',d:'Keynote / raise tier'}}
};

/* ---- ledger kinds: [label, stat, unit?, xp, sub] ---- */
const KINDS={
 train:['Training session','STR',1,XP.train,'≥30 min, progress vs last'],
 cardio:['Cardio session','VIT',1,15,'≥30 min steady or ≥15 min hard'],
 swim:['Swim','VIT',1,16,'≥20 min in the water'],
 sport:['Team sport','VIT',1,15,'football, basketball, tennis… ≥45 min real play'],
 mobility:['Mobility','',0,10,'≥20 min · joint health, not VIT'],
 cold:['Cold shower','VIT',0,8,'full cold, 2+ min'],
 read:['Reading session','WIS',1,10,'≥25 min · 1/day counts'],
 chess:['Chess block','WIS',1,12,'one 30-min rapid, reviewed after · or 30 min study · or 3 quick rapids + 1 review · 4/wk'],
 review:['Weekly review','WIS',1,14,'written, honest'],

 neet:['NeetCode problem','INT',1,XP.block,'solved unassisted'],
 cs50:['CS50 pset step','INT',1,XP.block,'milestone done'],
 thm:['THM room','INT',1,XP.block,'completed'],
 uni:['Uni coursework','INT',1,XP.block,'forensics degree — lecture, lab, or assignment ≥30 min'],
 code:['Code / AI block','INT',1,XP.block,'the spine: boot.dev · LLM APIs · Python · ML — ≥30 min'],
 demo:['Demo / discovery call','CHA',2,XP.sell.demo,'delivered'],
 outreach:['Outreach batch','CHA',1,XP.sell.outreach,'≥5 sent, ≥1 reply'],
 post:['Post published','CHA',1,XP.sell.post,'2/wk count'],
 event:['Event / meetup','CHA',2,XP.sell.event,'showed up, talked'],
 convo:['Hard conversation','CHA',1,XP.sell.convo,'you initiated'],
 talk:['Talk (5+ people)','CHA',3,XP.sell.talk,'delivered'],
 sunrise:['Sunrise walk','VIT',0,8,'out before 08:00'],
 med:['Meditation','WIS',0,8,'≥10 min'],
 custom:['Custom (XP only)','',0,10,'anything else worth logging']
};

/* ---- side-quest deck: [id,stat,rarity1-3,unit,quick,kind,name,done] ; {n} scales ---- */
const DECK=[
['s01','STR',1,0,1,'','Grip hang {n}s total','done = timer, any splits'],
['s02','STR',1,1,0,'train','Bodyweight circuit ×{n} rounds','pushups·squats·rows, no rest between'],

['s11','STR',1,0,1,'','{n} bodyweight squats','below parallel'],
['s12','STR',2,1,0,'train','Loaded backpack squats 5×15','pack it heavy with books/water, below parallel'],
['s13','STR',2,1,0,'train','Pistol squat practice 15 min','progressions count'],
['s14','STR',1,0,1,'','Dead hang 3×max','note the times'],
['s15','STR',2,0,0,'','Core circuit 15 min','no phone between sets'],
['s16','STR',1,0,1,'','{n} lunges per leg','walking or static'],
['s17','STR',2,1,0,'train','Push day finisher: burnout set','one movement to failure ×3'],
['s18','STR',1,0,1,'','Bear crawl 5 min total','hallway counts'],
['s19','STR',2,0,0,'','Towel rows 4×{n}','door anchor, slow'],

function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let a=seed;return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

function beep(f=660,d=.07,g=.04){try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),v=audioCtx.createGain();o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}catch(_){}}

function band(score){return Math.min(4,Math.floor(score/20))}
function price(score){return PRICE[band(score)]}
function nextGate(score){return Math.min(100,(Math.floor(score/20)+1)*20)}
function atWall(st){const s=S.stats[st];return (s.score%20===19)&&s.cleared<nextGate(s.score)}
function gatesClearedCount(s){return STATS.reduce((a,k)=>a+(s.stats[k].cleared/20),0)}
function signalMult(){return S.shadow<20?1.1:S.shadow>=70?0.9:1}
function awardXP(n,why){
  if(installed('ch8')&&why==='ledger')n+=2;
  n=n*signalMult();
  const before=levelFromXP(S.xp).l;
  S.xp+=Math.max(0,Math.round(n));S.daily.xp+=Math.max(0,Math.round(n));
  const after=levelFromXP(S.xp).l;
  if(after>before){beep(880,.12,.05);toast('LEVEL '+after+' — '+rankFor(after),true);checkFiles()}
}
function awardUnit(stat,n,src){
  if(!stat||!STATS.includes(stat))return 0;
  const cap=UCAP[stat],used=S.daily.units[stat];
  const grant=Math.max(0,Math.min(n,cap-used));
  const spill=n-grant;
  if(spill>0)awardXP(spill*5,'spill');
  if(grant<=0){return 0}
  S.daily.units[stat]+=grant;S.totals.units[stat]+=grant;
  const st=S.stats[stat];
  for(let i=0;i<grant;i++){
    if((st.score%20===19)&&st.cleared<nextGate(st.score)){
      if(st.prog<price(st.score)){st.prog++;if(st.prog>=price(st.score))toast(stat+' AT GATE — proof required',true)}
      else awardXP(5,'spill');
      continue;
    }
    st.prog++;
    if(st.prog>=price(st.score)){st.prog=0;st.score=Math.min(100,st.score+1);beep(740,.06);toast(stat+' → '+st.score,false);}
  }
  checkFiles();checkChrome();
  return grant;
}
function clearGate(stat,gate,proof){
  const st=S.stats[stat];
  st.cleared=Math.max(st.cleared,gate);
  if(st.score===gate-1&&st.prog>=price(st.score)){st.prog=0;st.score=gate}
  else if(st.score<gate&&st.score===gate-1){/* keep */}
  S.gatesLog.push({stat,gate,date:todayStr(),proof});
  awardXP(100*(gate/20),'gate');
  toast(stat+' GATE '+gate+' — '+GATES[stat][gate].n,true);beep(980,.15,.06);
  checkFiles();checkChrome();save();syncPush(false);renderAll();
}
function checkFiles(){
  const has=id=>S.files.includes(id);const add=id=>{if(!has(id)){S.files.push(id);const f=FILES.find(x=>x[0]===id);toast('FILE UNLOCKED — '+f[1],true);beep(520,.2,.05)}};
  const monthGates=S.gatesLog.filter(g=>monthKey(g.date)===monthKey(todayStr())).length;
  if(S.totals.fullDays>=1)add('f01');
  if(gatesClearedCount(S)>=1)add('f02');
  if(S.totals.challenges>=1)add('f03');
  if(S.audits.some(a=>a.dirDone)||(S.directive.locked&&S.directive.locked.done))add('f04');
  if(S.streak>=7||S.bestStreak>=7)add('f05');
  if(S.streak>=30||S.bestStreak>=30)add('f06');
  if(S.stats.STR.score>=40)add('f07');
  if(S.stats.INT.score>=40)add('f08');
  if(S.counters.booksDone>=1)add('f09');
  if(S.log.some(d=>d.kinds&&d.kinds.includes('swim'))||S.daily.kindsSwim)add('f10');
  if(S.totals.buildMin>=6000)add('f11');
  if(S.stats.VIT.cleared>=20)add('f12');
  if(S.counters.talks>=1)add('f13');
  if(levelFromXP(S.xp).l>=10)add('f14');
  if(levelFromXP(S.xp).l>=20)add('f15');
  if(S.audits.some(a=>a.pct>=80))add('f16');
  if(S.totals.mercyBurns>=1)add('f17');
  if(monthGates>=2)add('f18');
  if(S.sleep&&S.sleep.cur===S.sleep.goal&&S.sleep.held>=7)add('f19');
}
function checkChrome(){
  for(const c of CHROMES){if(!S.chrome.owned.includes(c[0])&&c[4](S)){S.chrome.owned.push(c[0]);toast('CHROME MINTED — '+c[1],true)}}

/* ---------- board dealing ---------- */
function scaleText(t,stat){
  const s=S.stats[stat]?S.stats[stat].score:0;let n=10;
  if(/pushups/i.test(t))n=30+Math.round(2*S.stats.STR.score);
  else if(/squats|lunges/i.test(t))n=40+Math.round(2.5*S.stats.STR.score);
  else if(/hang|sit|Plank/i.test(t))n=60+Math.round(3.5*S.stats.STR.score);
  else if(/rounds/i.test(t))n=4+Math.floor(S.stats.STR.score/10);
  else if(/ladder to/i.test(t))n=5+Math.floor(S.stats.STR.score/8);
  else if(/4×/.test(t))n=12+Math.floor(S.stats.STR.score/5);
  else if(/run {n} min|rope {n} min/i.test(t)||/{n} min/.test(t))n=25+Math.floor(S.stats.VIT.score/2);
  return t.replace('{n}',n);
}
function questXP(q){const base=[0,20,35,60][q.r]||20;let x=base+ (q.r===3?6:0);if(installed('ch5'))x=Math.round(x*1.1);return x}
function dealBoard(day){
  const seed=hashStr(day+'|board');const R=rng(seed);
  const recent=new Set(S.served.slice(-30));
  const pool=DECK.filter(d=>!recent.has(d[0]));
  const pick=(flt)=>{
    let cand=pool.filter(flt);if(!cand.length)cand=DECK.filter(flt);if(!cand.length)cand=pool.length?pool:DECK;
    // rarity weights
    const roll=R();let want=roll<0.65?1:roll<0.92?2:3;
    let sub=cand.filter(c=>c[2]===want);if(!sub.length)sub=cand;
    return sub[Math.floor(R()*sub.length)];
  };
  const out=[];const usedStats=new Set();let rares=0,quick=0;
  for(let i=0;i<4;i++){
    const q=pick(c=>!out.some(o=>o[0]===c[0])
      &&(rares<1||c[2]<3)
      &&(i<3||usedStats.size>=3||!usedStats.has(c[1])||c[1]==='')
      &&(i<3||quick>=1||c[4]===1));
    out.push(q);usedStats.add(q[1]);if(q[2]===3)rares++;if(q[4])quick++;
  }
  S.served.push(...out.map(o=>o[0]));S.served=S.served.slice(-60);
  return out.map(o=>({id:o[0],stat:o[1],r:o[2],u:o[3],kind:o[5],name:scaleText(o[6],o[1]),sub:o[7]}));
}
function dealChallenge(day){
  const base=String(day).split('|')[0]; // reroll seeds append |cN — strip before date math
  const stat=STATS[dayNumber(base)%5];
  let opts=CHALLENGES.filter(c=>c[0]===stat);
  if(S.phase!=='sell'){const f=opts.filter(c=>c[4]!=='outreach');if(f.length)opts=f;}
  const c=opts[Math.floor(rng(hashStr(day+'|chal'))()*opts.length)];
  return{id:c[1],stat,name:c[2],sub:c[3],kind:c[4],xp:c[5]};
}
function rollDirectiveOptions(mk,sh){
  const R=rng(hashStr(mk+'|dir|'+(sh||0)));const idx=new Set();
  while(idx.size<3)idx.add(Math.floor(R()*DIRECTIVES.length));
  return[...idx].map(i=>{const d=DIRECTIVES[i];return{id:d[0],title:d[1],desc:d[2],target:d[3],link:d[4]}});
}
window.reshuffleDir=()=>{
  S.directive.shuffle=(S.directive.shuffle||0)+1;
  S.directive.options=rollDirectiveOptions(monthKey(S.daily.day),S.directive.shuffle);
  save();renderAll();
};

/* ---------- rollover ---------- */
function fullDayMinimums(day,d){
  const miss=[];
  const plan=S.trainPlan[weekday(day)]||'Rest';
  if(plan==='Rest'){if(!d.restHonored&&!d.train)miss.push('TRAIN')}
  else if(!d.train)miss.push('TRAIN');
  const tgt=S.schedule[weekday(day)]||0;
  if(tgt>0&&d.buildMin<tgt)miss.push('BUILD');
  if(!d.study.ma)miss.push('STUDY');
  return miss;
}
const FULL_TARGET=90;
const SELL_KINDS=['demo','outreach','post','event','convo','talk'];
const STUDY_KINDS=['code','ma','pwn','neet','cs50','thm','uni'];
const ANCHORS={code:'Code / AI spine',thm:'TryHackMe',pwn:'pwn.college',neet:'NeetCode',ma:'Math Academy',uni:'Uni coursework'};
// a day is a target you fill however you want — build is the heaviest lever, everything real counts
function dayScore(d){
  const wd=weekday(d.day);const tgt=S.schedule[wd]||0;let s=0;
  if(tgt>0)s+=Math.min(68,Math.round((d.buildMin||0)/tgt*55));
  else s+=Math.min(40,Math.round((d.buildMin||0)/60*20));
  if(d.train||d.restHonored)s+=35;
  const K0=d.kindsList||[];const anch=S.studyAnchor||'ma';
  if(K0.includes(anch)||(anch==='ma'&&d.study.ma))s+=30;
  if(STUDY_KINDS.some(k=>k!==anch&&K0.includes(k)))s+=8;
  const K=d.kindsList||[];
  s+=Math.min(36,K.filter(k=>SELL_KINDS.includes(k)).length*18);
  if(d.chalDone)s+=25;
  s+=Math.min(36,(d.doneQ?d.doneQ.length:0)*12);
  if(d.lifted)s+=12;
  s+=Math.min(18,K.filter(k=>!SELL_KINDS.includes(k)&&!STUDY_KINDS.includes(k)).length*6);
  return s;
}
function dayHeld(d){return dayScore(d)>0}
function closeDay(d){
  const day=d.day;
  if(S.mercy.week!==mondayKey(day)){S.mercy={week:mondayKey(day),available:installed('ch4')?2:1,burnedInfo:null}}
  const score=dayScore(d);
  const full=score>=FULL_TARGET;
  const held=score>0;
  let burned=false;
  if(full){
    S.streak++;S.totals.fullDays++;
    S.shadow=Math.max(0,S.shadow-(15+(installed('ch7')?2:0)));
  }else if(held){
    S.streak++;
    S.shadow=Math.max(0,S.shadow-5);
  }else if(S.mercy.available>0){
    S.mercy.available--;S.totals.mercyBurns++;S.mercy.burnedInfo={covered:day,missed:'no activity'};
    S.streak++;S.totals.fullDays++;burned=true;
  }else{
    S.streak=0;S.shadow=Math.min(100,S.shadow+10);
  }
  S.bestStreak=Math.max(S.bestStreak,S.streak);
  S.totals.dayCount++;
  S.log.unshift({day,full,held,burn:burned,score,buildMin:d.buildMin,note:d.note,xp:d.xp,
    units:d.units,quests:d.doneQ.length,train:d.train?d.train.type:(d.restHonored?'Rest':null),
    kinds:d.kindsList||[],sessions:d.sessions||[],wake:d.wake||null});
  S.log=S.log.slice(0,1100);
  if(S.sleep&&!d.wake){const sl=S.sleep;sl.miss5.push(false);sl.miss5=sl.miss5.slice(-5);
    if(sl.miss5.filter(x=>!x).length>=3){sl.cur=Math.min(sl.start,sl.cur+20);sl.held=0;sl.miss5=[];}}
  S.debrief={day,full,held,burn:burned,score,
    xp:d.xp,buildMin:d.buildMin,units:{...d.units},quests:d.doneQ.length,chal:!!d.chalDone,
    note:d.note,streak:S.streak,shadow:S.shadow,gaps:0};
}
function closeStaleLive(today){
  if(!S.live)return;
  const startDay=S.live.day;
  if(startDay!==today){
    // credit a conservative capped session to its start day, then close
    if(S.daily.day===startDay){const cr=Math.min(720,Math.max(15,Math.round((Date.now()-S.live.since)/60000)));logBuildMinutes(cr,true)}
    S.live=null;toast('Stale JACK IN closed');
  }
}
function processRollovers(){
  const today=todayStr();
  if(S.daily.day===today)return;
  closeStaleLive(today);
  // close the daily we have
  closeDay(S.daily);
  // gap days between
  let cur=addDays(S.daily.day,1);let guard=0;
  while(cur!==today&&guard<90){
    const gd=freshDaily(cur);
    if(S.mercy.week!==mondayKey(cur)){S.mercy={week:mondayKey(cur),available:installed('ch4')?2:1,burnedInfo:null}}
    if(S.mercy.available>0){S.mercy.available--;S.totals.mercyBurns++;S.mercy.burnedInfo={covered:cur,missed:'gap day'};
      S.streak++;S.bestStreak=Math.max(S.bestStreak,S.streak);S.totals.fullDays++;}
    else{S.streak=0;S.shadow=Math.min(100,S.shadow+12)}
    S.totals.dayCount++;
    S.log.unshift({day:cur,full:S.mercy.burnedInfo&&S.mercy.burnedInfo.covered===cur,miss:['gap'],buildMin:0,note:'',xp:0,units:{},quests:0,train:null,kinds:[]});
    cur=addDays(cur,1);guard++;
  }
  if(S.debrief&&guard>0)S.debrief.gaps=guard;
  // weekly resets (current week context)
  if(S.weekly.week!==mondayKey(today)){
    S.weekly={week:mondayKey(today),cardioMin:0,vitBonus:false,mobility:0,chess:0,longform:0,posts:0,challenges:0,chalReroll:0,trainSessions:0,trainBonus:false};
  }
  if(S.sell.week!==mondayKey(today)){
    S.sell.week=mondayKey(today);S.sell.outreach=0;S.sell.posts=0;S.sell.demos=0;S.sell.paid=false;
  }
  if(S.mercy.week!==mondayKey(today)){S.mercy={week:mondayKey(today),available:installed('ch4')?2:1,burnedInfo:S.mercy.burnedInfo}}
  // month rollover → audit + directive
  const mkPrev=monthKey(S.daily.day),mkNow=monthKey(today);
  if(mkPrev!==mkNow){
    const monthDays=S.log.filter(l=>monthKey(l.day)===mkPrev);
    const fulls=monthDays.filter(l=>l.full).length;
    const pct=monthDays.length?Math.round(100*fulls/monthDays.length):0;
    const title=pct>=80?'CLEAN SIGNAL':pct>=60?'HELD THE LINE':pct>=40?'IN THE STATIC':'SIGNAL LOST';
    const bDone=S.bounties.filter(b=>b.done).length;
    const dl=S.directive.locked;
    S.audits.unshift({month:mkPrev,pct,title,bounties:bDone+'/'+S.bounties.length,
      dirTitle:dl?dl.title:'—',dirDone:!!(dl&&dl.done),challenges:S.totals.challenges,units:{...S.totals.units}});
    S.audits=S.audits.slice(0,12);
    S.bounties=[];S.bountyMonth=mkNow;
    S.directive={month:mkNow,options:rollDirectiveOptions(mkNow),locked:null};
    toast('AUDIT FILED — '+title,true);
  }
  if(!S.directive.options.length&&!S.directive.locked)S.directive.options=rollDirectiveOptions(monthKey(today));
  // new day
  S.daily=freshDaily(today);
  S.daily.board=dealBoard(today);
  S.daily.chal=dealChallenge(today);
  if(S.mercy.burnedInfo)S.daily.mercyBanner=S.mercy.burnedInfo;
  S.mercy.burnedInfo=null;
  S.lastDay=today;
  checkFiles();save();
  syncPush(false);
}

/* ---------- ledger core ---------- */
function trackWeeklyKindCaps(kind){
  const w=S.weekly;
  if(kind==='mobility'){if(w.mobility>=2)return false;w.mobility++;return true}
  if(kind==='chess'){if(w.chess>=4)return false;w.chess++;return true}
  if(kind==='longform'){if(w.longform>=2)return false;w.longform++;return true}
  if(kind==='post'){if(w.posts>=2)return false;w.posts++;return true}
  if(kind==='read'){if(S.daily.read)return false;S.daily.read=true;return true}
  if(kind==='review'){if(S.daily.review)return false;S.daily.review=true;return true}
  return true;
}
function ledgerAdd(kind,opts={}){
  const K=KINDS[kind];if(!K)return;
  const[label,stat,units,xp]=K;
  let unitOK=units>0;
  if(unitOK)unitOK=trackWeeklyKindCaps(kind);
  let granted=0;
  if(unitOK)granted=awardUnit(stat,units,kind);
  let gain=xp;
  if(opts.size)gain=XP.free[opts.size]||xp;
  if(opts.xpOverride)gain=opts.xpOverride;
  if(kind==='train'&&opts.progressed)gain+=XP.prog;
  if(installed('ch6')&&['code','ma','pwn','neet','cs50','thm','uni'].includes(kind))gain=Math.round(gain*1.1);
  awardXP(gain,'ledger');
  S.totals.ledger++;
  // side effects
  if(kind==='train'){S.daily.train={type:opts.type||'Session',progressed:!!opts.progressed};
    S.weekly.trainSessions=(S.weekly.trainSessions||0)+1;
    if(!S.weekly.trainBonus&&S.weekly.trainSessions>=3){S.weekly.trainBonus=true;awardXP(25,'trainweek');toast('3rd session this week — floor cleared',true)}}
  if(kind==='ma')S.daily.study.ma=true;
  if(['code','pwn','neet','cs50','thm','uni'].includes(kind)){S.daily.study.pick=kind;
    if(kind==='neet')S.tracks.neet++;if(kind==='pwn')S.tracks.pwn.ch++;}
  if(['cardio','swim','sport'].includes(kind))S.weekly.cardioMin+=(opts.min||30);
  if(kind==='swim'){S.daily.kindsSwim=true}
  if(kind==='demo'){S.sell.demos++;S.counters.demos++;S.counters.chaReps+=2}
  if(kind==='outreach'){S.sell.outreach++;S.counters.chaReps++}
  if(kind==='post'){S.sell.posts++;S.counters.posts++;S.counters.chaReps++}
  if(kind==='talk'){S.counters.talks++;S.counters.chaReps+=3}
  if(['event','convo'].includes(kind))S.counters.chaReps+=(kind==='event'?2:1);
  if(kind==='review')S.counters.reviews++;
  (S.daily.kindsList=S.daily.kindsList||[]).push(kind);
  // weekly VIT bonus
  if(!S.weekly.vitBonus&&S.weekly.cardioMin>=150){S.weekly.vitBonus=true;awardUnit('VIT',1,'weekly-bonus');toast('VIT weekly bonus — 150 min banked')}
  // sell quota
  const q=S.sell.quota;
  if(S.phase==='sell'&&!S.sell.paid&&S.sell.outreach>=q.outreach&&S.sell.posts>=q.posts&&S.sell.demos>=q.demos){
    S.sell.paid=true;awardXP(XP.quota,'quota');toast('SELL QUOTA MET +'+XP.quota+' XP',true)}
  // directive auto-link
  const dl=S.directive.locked;
  if(dl&&!dl.done&&dl.link===kind){dl.count++;if(dl.count>=dl.target){dl.done=true;awardXP(XP.dir,'dir');toast('DIRECTIVE COMPLETE — '+dl.title,true)}}
  const uTxt=granted>0?(' · +'+granted+' '+stat+' unit'+(granted>1?'s':'')):(units>0&&!unitOK?' · cap reached (XP only)':'');
  toast(label+' +'+gain+' XP'+uTxt);
  save();renderAll();
}

function logBuildMinutes(mins,silent){
  const before=S.daily.buildMin;
  S.daily.buildMin=Math.max(0,Math.min(960,S.daily.buildMin+mins));
  const added=S.daily.buildMin-before;
  S.totals.buildMin+=Math.max(0,added);
  let gain=Math.round(added*XP.hour/60);
  if(installed('ch2'))gain=Math.round(gain*1.05);
  awardXP(gain,'build');
  const tgt=S.schedule[weekday(S.daily.day)]||0;
  if(tgt>0&&!S.daily.buildBonus&&S.daily.buildMin>=tgt){S.daily.buildBonus=true;awardXP(XP.target,'target');toast('BUILD TARGET HIT +'+XP.target,true)}
  if(!silent)toast('SCORE +'+fmtMin(Math.max(0,added))+' · +'+gain+' XP');
  checkFiles();checkChrome();save();renderAll();
}

  const before=S.daily.buildMin;S.daily.buildMin=Math.max(0,S.daily.buildMin+m);

/* ---- sleep ladder + water ---- */
window.setupSleep=()=>{
  const cur=parseHM(prompt('What time do you ACTUALLY wake now, on average? (HH:MM)','08:30'));
  if(cur===null){toast('Format HH:MM');return}
  const goal=parseHM(prompt('Target wake time:','06:30'));
  if(goal===null){toast('Format HH:MM');return}
  if(cur<=goal){S.sleep={goal,cur:goal,start:goal,held:0,miss5:[]};toast('Already at target — now hold it');}
  else{S.sleep={goal,cur,start:cur,held:0,miss5:[]};
    toast('LADDER SET — first step: wake '+fmtHM(cur)+', lights-down '+fmtHM(Math.max(0,cur-465)),true)}
  save();renderAll();
};
window.wakeConfirm=()=>{
  const sl=S.sleep;if(!sl)return;const d=S.daily;
  if(d.wake){toast('Already confirmed today');return}
  const n=new Date();const mins=n.getHours()*60+n.getMinutes();
  if(mins<240){toast('Before 04:00 doesn\u2019t count — go back to sleep');return}
  if(mins>sl.cur+25){toast('Window closed ('+fmtHM(sl.cur)+' +25m). Tomorrow.');return}
  d.wake=fmtHM(mins);
  sl.miss5.push(true);sl.miss5=sl.miss5.slice(-5);
  awardXP(12,'sleep');waterAdd(true);
  if(sl.cur>sl.goal){
    sl.held++;
    if(sl.held>=3){sl.cur=Math.max(sl.goal,sl.cur-20);sl.held=0;
      awardXP(25,'phase');beep(880,.15,.05);
      toast(sl.cur===sl.goal?'FINAL STEP — wake '+fmtHM(sl.cur)+'. Now hold it.':'PHASE ADVANCE — wake '+fmtHM(sl.cur),true)}
  }else{sl.held++;if(sl.held===7){toast('TARGET HELD — 7 mornings at '+fmtHM(sl.goal),true)}}
  checkFiles();save();renderAll();
};
window.waterAdd=(auto)=>{
  const d=S.daily;const g=S.waterGoal||8;
  d.water=(d.water||0)+1;
  if(d.water===g){awardXP(10,'water');toast('HYDRATED — '+g+'/'+g)}
  save();if(!auto)renderAll();
};

window.submitLiftGate=(stat,gate)=>{
  const sq=+($('g-sq').value||0),be=+($('g-be').value||0),dl=+($('g-dl').value||0);
  const r=GATES[stat][gate].r;const bw=S.bw||80;

  if(hits>=2){closeSheet();clearGate(stat,gate,`sq${sq}/be${be}/dl${dl} @bw${bw}`)}
  else toast(hits+'/3 at standard — need 2. The bar says not yet.');
};
window.strGateMode=()=>{const b=document.querySelector('#g-mode .on');const cal=b&&b.dataset.m==='cal';
  if($('g-bar'))$('g-bar').style.display=cal?'none':'';if($('g-cal'))$('g-cal').style.display=cal?'':'none'};
window.submitStrGate=(stat,gate)=>{
  const b=document.querySelector('#g-mode .on');const cal=b&&b.dataset.m==='cal';

  const cg=CAL_GATE[gate];const pu=+($('c-pu').value||0),dip=+($('c-dip').value||0),push=+($('c-push').value||0);
  const hits=[pu>=cg.pu,dip>=cg.dip,push>=cg.push].filter(Boolean).length;
  if(hits>=2){closeSheet();clearGate(stat,gate,`cal pu${pu}/dip${dip}/push${push}`)}
  else toast(hits+'/3 calisthenics standards — need 2. Not yet.');
};
function parseTimeStr(v){const p=String(v).trim().split(':').map(Number);if(!p.length||p.some(isNaN))return null;
  if(p.length===2)return p[0]*60+p[1];if(p.length===3)return p[0]*3600+p[1]*60+p[2];return null}

/* ---- lift tracker (progressive overload, all modalities) ---- */
function liftHist(id){return S.lifts[id]||[]}
function liftBest(id){const h=liftHist(id);return h.length?h.reduce((a,b)=>b.e>a.e?b:a):null}
function liftLast(id){const h=liftHist(id);return h.length?h[h.length-1]:null}
function liftScore(l,lvl,w,reps){
  if(l[2]==='w')return e1rm(+w||0,reps);
  const f=(lvl!=null&&PROG[l[0]]&&PROG[l[0]][lvl])?PROG[l[0]][lvl][1]:1.0;
  return e1rm(f*(S.bw||0)+(+w||0),reps);
}
function liftDisp(l,e){
  if(!e)return '—';
  if(l[2]==='w')return e.w+'kg × '+e.r;
  const nm=(e.lvl!=null&&PROG[l[0]]&&PROG[l[0]][e.lvl])?PROG[l[0]][e.lvl][0]:'Standard';
  return nm+' × '+e.r+(e.w>0?' +'+e.w+'kg':'');
}
window.openLift=(id)=>{
  const l=LIFTMAP[id];if(!l)return;const bw=l[2]==='bw';
  const last=liftLast(id),best=liftBest(id);const h=liftHist(id).slice(-6).reverse();
  const histHTML=h.length?h.map(e=>`<div class="prow" style="padding:7px 14px"><div class="lab" style="font-size:12.5px">${e.d}</div><span class="meta num">${liftDisp(l,e)} · e1RM ${e.e}</span></div>`).join(''):'<div class="empty">No entries yet — log your top set.</div>';
  const defLvl=last&&last.lvl!=null?last.lvl:(progStd[id]!=null?progStd[id]:0);

};
window.submitLift=(id)=>{
  const l=LIFTMAP[id];const bw=l[2]==='bw';
  const w=+($('lf-w').value||0),r=parseInt($('lf-r').value||0);
  if(!r||r<1){toast('Enter reps');return}
  if(!bw&&w<=0){toast('Enter the weight');return}
  let lvl=null;if(bw){const b=document.querySelector('#lf-lvl .on');lvl=b?+b.dataset.i:(progStd[id]||0)}
  const e=liftScore(l,lvl,w,r);
  const prevBest=liftBest(id);const today=todayStr();
  const loggedToday=liftHist(id).some(x=>x.d===today);
  S.lifts[id]=liftHist(id).concat([{d:today,lvl,w,r,e}]);
  let msg=l[1]+' logged';
  if(!loggedToday){awardXP(8,'lift');
    if(!prevBest||e>prevBest.e){
      awardXP(15,'pr');const got=awardUnit('STR',1,'pr');
      S.daily.train=S.daily.train||{type:'Lift',progressed:true};if(S.daily.train)S.daily.train.progressed=true;
      toast('NEW PR — '+l[1]+' e1RM '+e+(got?' · ▲STR':''),true);beep(920,.14,.06);msg='';}
  }
  if(msg)toast(msg+' · e1RM '+e);
  S._pend=0;pushSession(l[1]+' '+liftDisp(l,{lvl,w,r})+' (e1RM '+e+')');S.daily.lifted=true;
  closeSheet();save();renderAll();
};

/* ---- cloud sync (GitHub Gist) ---- */
const GIST_FILE='odessos-v5.json';
function ghHeaders(sy){return{'Authorization':'Bearer '+sy.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'}}
async function findGist(sy){
  try{
    const res=await fetch('https://api.github.com/gists?per_page=100',{headers:ghHeaders(sy)});
    if(!res.ok)return null;
    const arr=await res.json();
    const hit=(arr||[]).find(g=>g.files&&g.files[GIST_FILE]);
    return hit?hit.id:null;
  }catch(e){return null}
}
async function syncPush(manual){
  const sy=S.sync;if(!sy||!sy.token)return;
  try{
    if(!sy.gist)sy.gist=await findGist(sy);
    const clean={...S,sync:{...S.sync,token:null}};
    const body={description:'ODESSOS v5 save — auto-synced, do not edit',public:false,
      files:{[GIST_FILE]:{content:JSON.stringify(clean)}}};
    const url=sy.gist?'https://api.github.com/gists/'+sy.gist:'https://api.github.com/gists';
    const res=await fetch(url,{method:sy.gist?'PATCH':'POST',headers:ghHeaders(sy),body:JSON.stringify(body)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const j=await res.json();
    sy.gist=j.id||sy.gist;sy.last=todayStr();S.lastExport=todayStr();
    save();
    if(manual){toast('Synced to GitHub');renderAll()}
  }catch(e){if(manual)toast('Sync failed — '+((e&&e.message)||'check token/network'))}
}
async function syncPull(manual){
  const sy=S.sync;if(!sy||!sy.token)return null;
  try{
    if(!sy.gist){sy.gist=await findGist(sy);save()}
    if(!sy.gist)return null;
    const res=await fetch('https://api.github.com/gists/'+sy.gist,{headers:ghHeaders(sy)});
    if(!res.ok)throw 0;
    const j=await res.json();
    const f=j.files&&j.files[GIST_FILE];
    if(!f)return null;
    let content=f.content;
    if(f.truncated&&f.raw_url){const r2=await fetch(f.raw_url);content=await r2.text()}
    return JSON.parse(content);
  }catch(e){if(manual)toast('Cloud read failed');return null}
}
window.syncNow=()=>syncPush(true);
window.syncRestore=async()=>{
  const remote=await syncPull(true);
  if(!remote){toast('No cloud save found for this token');return}
  if(!confirm('Cloud save (last day: '+(remote.lastDay||'?')+', '+(remote.xp||0)+' xp) — replace what\u2019s on this phone?'))return;
  const tok=S.sync.token,g=S.sync.gist;
  S=normalize(remote);
  S.sync=S.sync||{};S.sync.token=tok;S.sync.gist=g;
  if(!S.daily.board.length){S.daily.board=dealBoard(S.daily.day);S.daily.chal=S.daily.chal||dealChallenge(S.daily.day)}
  processRollovers();
  save();renderAll();toast('Restored from cloud',true);
};

  const data=JSON.stringify(S);const name='odessos-backup-'+todayStr()+'.json';
  const done=msg=>{S.lastExport=todayStr();save();renderAll();if(msg)toast(msg)};
  try{
    if(navigator.share&&window.File){
      const f=new File([data],name,{type:'application/json'});
      if(!navigator.canShare||navigator.canShare({files:[f]})){
        await navigator.share({files:[f],title:name});
        done('Backup shared — put it somewhere real');return;
      }
    }
  }catch(e){if(e&&e.name==='AbortError')return}
  try{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download=name;a.click();done('Backup downloaded');return;
  }catch(e){}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(data).then(()=>done('Save copied — paste into Notes NOW'),()=>prompt('Copy this:',data));

};

const P={};
window.placeStep=(step,skip)=>{
  if(step===0&&skip){S.placed=true;save();closeSheet();renderAll();toast('Placed at zero — everything is upside');return}
  if(!skip){
    if(step===0){P.bw=+$('p-bw').value||S.bw;P.sq=+$('p-sq').value||0;P.be=+$('p-be').value||0;P.dl=+$('p-dl').value||0}
    if(step===1){const v=$('p-run').value.trim();P.run=v;P.runSec=null;
      if(v){const s=parseTimeStr(v);
        if(s===null){toast('Format mm:ss, e.g. 27:40');return}
        if(s<780){toast('Under 13:00 is faster than the 5k world record — enter total time, not min/km pace');return}

    if(step===3){P.books=+$('p-books').value||0;P.chess=+$('p-chess').value||0}
    if(step===4){P.demos=+$('p-demos').value||0;P.posts=+$('p-posts').value||0;P.talks=+$('p-talks').value||0}
  }
  if(step<4){openPlacement(step+1);return}
  applyPlacement();closeSheet();
};
function applyPlacement(){
  S.bw=P.bw||S.bw;
  const place=(stat,gate,proof)=>{if(gate>0){S.stats[stat].score=gate;S.stats[stat].cleared=gate;S.gatesLog.push({stat,gate,date:todayStr(),proof:'placement: '+proof})}};
  // STR
  let sg=0;const bw=S.bw;
  for(const g of[20,40,60,80,100]){const r=GATES.STR[g].r;
    const hits=[(P.sq||0)>=r.sq*bw,(P.be||0)>=r.be*bw,(P.dl||0)>=r.dl*bw].filter(Boolean).length;
    if(hits>=2)sg=g;else break}
  place('STR',sg,`sq${P.sq}/be${P.be}/dl${P.dl}`);
  // VIT
  let vg=0;
  if(P.runSec){for(const g of[20,40,60,80,100]){if(GATES.VIT[g].p.k5&&P.runSec<=GATES.VIT[g].p.k5)vg=g;else break}}
  place('VIT',vg,'5k '+(P.run||'none'));
  // INT
  place('INT',P.int||0,'attested tier');
  // WIS
  S.counters.booksDone=P.books||0;S.chessRating=P.chess||0;
  let wg=0;for(const g of[20,40,60,80,100]){const gd=GATES.WIS[g];if((P.books||0)>=gd.b||(P.chess||0)>=gd.c)wg=g;else break}
  place('WIS',wg,'books '+(P.books||0)+' / rating '+(P.chess||0));
  // CHA
  S.counters.demos=P.demos||0;S.counters.posts=P.posts||0;S.counters.talks=P.talks||0;
  S.counters.chaReps=(P.demos||0)*2+(P.posts||0)+(P.talks||0)*3;
  let cg=0;
  if((P.demos||0)>=5&&(P.posts||0)>=3)cg=20;
  if((P.demos||0)>=25&&(P.talks||0)>=1)cg=40;
  place('CHA',cg,'demos '+(P.demos||0));
  S.placed=true;checkFiles();save();renderAll();

      <div class="body"><span class="num">${fmtMin(l.buildMin||0)}</span> build · ${l.train?l.train+' · ':''}${l.quests||0} quests · <span class="num">${l.xp||0}</span> xp${l.wake?' · ☀ '+l.wake:''}
      ${l.note?`<div class="note">${esc(l.note)}</div>`:''}</div></div>`;
    });
    if(S.log.length>lim)h+=`<button class="btn sec" style="width:100%;margin-bottom:12px" onclick="window._ln=${lim+120};renderAll()">Show more · ${S.log.length} days</button>`;
  }
  $('v-log').innerHTML=h;
}

/* ---- signal strip ---- */
(function(){
  const cv=$('sig'),ctx=cv.getContext('2d');let t=0;
  function size(){cv.width=cv.clientWidth*devicePixelRatio;cv.height=22*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
  size();addEventListener('resize',size);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  function frame(){
    const w=cv.clientWidth,h=22,mid=h/2;
    ctx.clearRect(0,0,w,h);
    const sh=S.shadow/100;
    ctx.beginPath();
    for(let x=0;x<=w;x+=2){
      const noise=(Math.sin(x*0.9+t*7.3)*Math.sin(x*0.23-t*3.1));
      const y=mid+Math.sin(x*0.045+t*1.6)*3+(noise*9*sh)*(Math.random()*0.4+0.8);
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=sh>0.6?'#c0453a':sh>0.3?'#b3641e':'#5b5bd6';
    ctx.globalAlpha=0.55;ctx.lineWidth=1.4;ctx.stroke();ctx.globalAlpha=1;
    t+=0.016;
    if(!reduce)requestAnimationFrame(frame);
  }
  frame();if(reduce)setInterval(frame,1500);
})();
